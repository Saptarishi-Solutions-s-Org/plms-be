name: PLMS BE CI Pipeline

on:
  push:
    branches: [dev, main]
  pull_request:
    branches: [dev, main]

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20]

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Print Node Version
        run: node -v

      - name: Install Dependencies
        run: npm ci

      # TypeScript check (NO emit)
      - name: Type Check
        run: npx tsc --noEmit

      # CAP model validation
      - name: Validate CDS Models
        run: npx cds build

      # Check server boots (IMPORTANT)
      - name: Smoke Test Server
        run: |
          timeout 10s npx tsx srv/server.ts || true
